name: Code metrics

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  mehen:
    runs-on: ubuntu-latest
    # Metrics only; don't block the merge queue on tool failures.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: ophidiarium/mehen@da1041131c8a12e9c7701b7c24bc207b8057a758 # v1.0.2
        with:
          paths: src
