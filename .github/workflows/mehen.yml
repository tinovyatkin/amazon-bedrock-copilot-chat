name: Code metrics

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  mehen:
    runs-on: ubuntu-latest
    # Metrics only; don't block the merge queue on tool failures.
    continue-on-error: true
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6
        with:
          fetch-depth: 0
      - uses: ophidiarium/mehen@d617b24b1548acd3622871efdf52c02881edc2be # v0
        with:
          paths: src
