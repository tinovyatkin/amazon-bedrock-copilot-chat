name: Code metrics

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  mehen:
    runs-on: ubuntu-latest
    # Metrics only; don't block the merge queue on tool failures.
    continue-on-error: true
    steps:
      - uses: actions/checkout@3d3c42e5aac5ba805825da76410c181273ba90b1 # v7
        with:
          fetch-depth: 0
      - uses: ophidiarium/mehen@44ec6d891304919318d05d4ecb9d9576d6c23bb8 # v1.5.0
        with:
          paths: src
