name: Code metrics

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  mehen:
    runs-on: ubuntu-latest
    # Metrics only; don't block the merge queue on tool failures.
    continue-on-error: true
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7
        with:
          fetch-depth: 0
      - uses: ophidiarium/mehen@a4a0b6d7965723928afc761a6b8c9e3f78bebd4e # v1.1.0
        with:
          paths: src
