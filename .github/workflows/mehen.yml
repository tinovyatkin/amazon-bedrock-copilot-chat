name: Code metrics

on:
  pull_request:

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  mehen:
    runs-on: ubuntu-latest
    # Metrics only; don't block the merge queue on tool failures.
    continue-on-error: true
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
        with:
          fetch-depth: 0
      - uses: ophidiarium/mehen@d617b24b1548acd3622871efdf52c02881edc2be # v0
        with:
          paths: src
